{% extends 'base.html' %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <div class="card">
        <h2 style="margin-bottom: 0.5rem; color: var(--text-main);">Post New Placement Drive</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Fill in the details for the new job role. All drives require admin approval before going live.</p>
        
        <form method="POST" action="{{ url_for('company.create_drive') }}">
            
            <div class="grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 1.5rem;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="job_title" class="form-label">Job Title / Role</label>
                    <input type="text" id="job_title" name="job_title" class="form-control" required placeholder="e.g., Software Development Engineer">
                </div>
                
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="role_type" class="form-label">Role Type</label>
                    <select id="role_type" name="role_type" class="form-select" required>
                        <option value="Full-time">Full-time</option>
                        <option value="Internship">Internship</option>
                        <option value="Contract">Contract</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="description" class="form-label">Role Description</label>
                <textarea id="description" name="description" class="form-control" rows="4" required placeholder="Describe the responsibilities and expectations..."></textarea>
            </div>
            
            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <div class="form-group">
                    <label for="ctc" class="form-label">CTC / Stipend</label>
                    <input type="text" id="ctc" name="ctc" class="form-control" required placeholder="e.g., 12 LPA or 30k/month">
                </div>
                
                <div class="form-group">
                    <label for="eligibility" class="form-label">Eligibility Criteria</label>
                    <input type="text" id="eligibility" name="eligibility" class="form-control" required placeholder="e.g., B.Tech CSE, 7.5+ CGPA">
                </div>
                
                <div class="form-group">
                    <label for="deadline" class="form-label">Application Deadline</label>
                    <input type="date" id="deadline" name="deadline" class="form-control" required>
                </div>
            </div>
            
            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Create Drive</button>
                <a href="{{ url_for('company.dashboard') }}" class="btn btn-outline" style="flex: 1;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
